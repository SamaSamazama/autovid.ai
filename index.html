<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoVid AI | Wan 2.2 Video Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        body { background-color: #05070a; color: white; font-family: sans-serif; }
        .active-ring { border: 2px solid #6366f1 !important; background: rgba(99, 102, 241, 0.2); }
        #stage video { width: 100%; height: 100%; object-fit: cover; border-radius: 1.5rem; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-white">AutoVid<span class="text-indigo-500">.ai</span></h1>
                <p class="text-xs text-gray-500 uppercase tracking-widest mt-1">Wan 2.2 Turbo Edition</p>
            </div>
            <div id="status" class="px-3 py-1 bg-yellow-500/10 text-yellow-500 text-[10px] font-bold rounded-full border border-yellow-500/20">
                CONNECTING TO AI...
            </div>
        </header>

        <div class="grid lg:grid-cols-2 gap-12">
            
            <div class="space-y-8">
                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">1. Choose Format</label>
                    <div class="flex gap-3">
                        <button id="btn916" onclick="setFormat('9:16')" class="active-ring flex-1 bg-gray-900 py-4 rounded-2xl font-bold text-sm border border-gray-800 hover:border-gray-600 transition">📱 Vertical (TikTok)</button>
                        <button id="btn169" onclick="setFormat('16:9')" class="flex-1 bg-gray-900 py-4 rounded-2xl font-bold text-sm border border-gray-800 hover:border-gray-600 transition">💻 Wide (YouTube)</button>
                    </div>
                </div>

                <div class="space-y-3">
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">2. Describe Your Video</label>
                    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-4 focus-within:border-indigo-500 transition">
                        <textarea id="promptArea" 
                            class="w-full h-40 bg-transparent text-white outline-none resize-none text-base placeholder-gray-600"
                            placeholder="Example: A cinematic shot of a futuristic robot walking through a neon-lit city in the rain, 4k, highly detailed."></textarea>
                    </div>
                </div>

                <div class="space-y-4">
                    <button id="genBtn" onclick="startGeneration()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-500 py-5 rounded-2xl font-black text-lg transition shadow-lg shadow-indigo-500/20 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                        GENERATE VIDEO
                    </button>
                    
                    <button id="dlBtn" class="hidden w-full bg-white/10 hover:bg-white/20 py-4 rounded-2xl font-bold flex items-center justify-center gap-2 border border-white/10 transition">
                        ⬇️ DOWNLOAD MP4
                    </button>
                </div>
            </div>

            <div class="relative">
                <div id="stage" class="bg-gray-900 border-2 border-dashed border-gray-800 rounded-[2.5rem] aspect-[9/16] flex items-center justify-center overflow-hidden transition-all duration-500">
                    <div id="previewLabel" class="text-center p-8">
                        <div class="text-4xl mb-4">✨</div>
                        <p class="text-gray-500 font-medium">Video Preview Area</p>
                        <p class="text-[10px] text-gray-700 mt-2 uppercase">Ready for Wan 2.2</p>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let currentSize = "720x1280";

        // Check if Puter is ready
        puter.ready().then(() => {
            const status = document.getElementById('status');
            status.innerText = "AI ONLINE";
            status.className = "px-3 py-1 bg-green-500/10 text-green-500 text-[10px] font-bold rounded-full border border-green-500/20";
        });

        function setFormat(ratio) {
            const stage = document.getElementById('stage');
            const b916 = document.getElementById('btn916');
            const b169 = document.getElementById('btn169');

            if(ratio === '9:16') {
                currentSize = "720x1280";
                stage.style.aspectRatio = "9/16";
                b916.classList.add('active-ring');
                b169.classList.remove('active-ring');
            } else {
                currentSize = "1280x720";
                stage.style.aspectRatio = "16/9";
                b169.classList.add('active-ring');
                b916.classList.remove('active-ring');
            }
        }

        async function startGeneration() {
            const promptInput = document.getElementById('promptArea');
            const genBtn = document.getElementById('genBtn');
            const stage = document.getElementById('stage');
            const dlBtn = document.getElementById('dlBtn');
            const label = document.getElementById('previewLabel');

            if (!promptInput.value.trim()) {
                alert("Please type a description first!");
                return;
            }

            // UI Loading State
            genBtn.disabled = true;
            genBtn.innerText = "RENDERING...";
            label.innerHTML = `
                <div class="animate-pulse">
                    <div class="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                    <p class="text-indigo-400 font-bold">Wan 2.2 is working</p>
                    <p class="text-[10px] text-gray-600 mt-2">Takes ~60 seconds</p>
                </div>
            `;

            try {
                // CALL THE AI
                const video = await puter.ai.txt2vid(promptInput.value, { 
                    model: "Wan-AI/Wan2.2-T2V-A14B",
                    size: currentSize 
                });

                // Display Video
                label.classList.add('hidden');
                stage.innerHTML = ""; 
                video.controls = true;
                video.autoplay = true;
                stage.appendChild(video);

                // Show Download
                dlBtn.classList.remove('hidden');
                dlBtn.onclick = () => {
                    const a = document.createElement('a');
                    a.href = video.src;
                    a.download = 'ai-video.mp4';
                    a.click();
                };

                genBtn.disabled = false;
                genBtn.innerText = "GENERATE ANOTHER";

            } catch (err) {
                console.error(err);
                alert("AI Busy. Try a shorter prompt!");
                genBtn.disabled = false;
                genBtn.innerText = "GENERATE VIDEO";
                label.innerHTML = `<p class="text-red-500 font-bold">Connection Error</p>`;
            }
        }
    </script>
</body>
</html>
